server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS - re-resolves service names every 10s.
    # Without this, nginx caches the resolved IP on startup. When lago-api
    # is recreated (redeploy, crash-restart) it gets a new container IP and
    # nginx keeps hitting the old one until lago-front is also restarted -> 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        # Variable in proxy_pass forces nginx to use the resolver above for
        # every request instead of caching the IP at startup.
        # NOTE: when proxy_pass uses a variable, nginx does NOT auto-strip the
        # location prefix — so we rewrite manually before passing upstream.
        set $lago_api_upstream lago-api;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://$lago_api_upstream:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
