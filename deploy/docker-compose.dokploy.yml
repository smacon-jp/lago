# =============================================================================
# Lago – Dokploy Production Compose (billing.smartcontents.co.jp)
# =============================================================================
#
# BEFORE DEPLOYING: build premium images on smacon-dev first:
#   ssh smacon-dev "cd /opt/lago-premium-build && ./scripts/build-premium.sh v1.45.1"
#
# HOW TO USE IN DOKPLOY:
#   1. Open https://console.ultrahost.jp → project monitoring-billing-kjuuru
#   2. Paste the full content of this file into the Compose editor
#   3. Save — do NOT redeploy yet
#   4. Make sure the premium images are built on the server (step above)
#   5. Redeploy
#
# IMAGE NOTES:
#   - lago-api-premium  = getlago/api base + 999_unlock_premium.rb initializer
#     (forces License.premium? true, all 27 integrations enabled, DB backfill)
#   - lago-front-premium = getlago/front base + fixed nginx config
#     (resolver 127.0.0.11, variable proxy_pass, unique upstream name to avoid
#      DNS collision with other Dokploy projects that also have a service named "api")
#   Both built by: scripts/build-premium.sh
#   Both verified by: scripts/verify-premium.sh
#
# VERSION BUMP WORKFLOW:
#   1. ssh smacon-dev "cd /opt/lago-premium-build && git pull && ./scripts/build-premium.sh vX.Y.Z"
#   2. Update LAGO_VERSION in the three image: lines below
#   3. Paste updated file into Dokploy → redeploy
# =============================================================================

volumes:
  lago_postgres_data:
  lago_redis_data:
  lago_storage_data:

x-postgres-image: &postgres-image
  image: getlago/postgres-partman:15.0-alpine

x-redis-image: &redis-image
  image: redis:7-alpine

x-backend-image: &backend-image
  image: lago-api-premium:v1.45.1          # built by scripts/build-premium.sh

x-frontend-image: &frontend-image
  image: lago-front-premium:v1.45.1        # built by scripts/build-premium.sh

x-lago-api-url: &lago-api-url
  LAGO_API_URL: ${LAGO_API_URL:-http://api:3000}

x-lago-front-url: &lago-front-url
  LAGO_FRONT_URL: ${LAGO_FRONT_URL:-https://billing.smartcontents.co.jp}

x-backend-environment: &backend-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-lago}:${POSTGRES_PASSWORD:-changeme}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-lago}?search_path=public
  REDIS_URL: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: true
  LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
  LAGO_SIDEKIQ_WEB: true
  LAGO_ENCRYPTION_PRIMARY_KEY: ${LAGO_ENCRYPTION_PRIMARY_KEY}
  LAGO_ENCRYPTION_DETERMINISTIC_KEY: ${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
  LAGO_ENCRYPTION_KEY_DERIVATION_SALT: ${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}
  LAGO_FROM_EMAIL: ${LAGO_FROM_EMAIL}
  LAGO_SMTP_ADDRESS: ${LAGO_SMTP_ADDRESS:-}
  LAGO_SMTP_PORT: ${LAGO_SMTP_PORT:-587}
  LAGO_SMTP_USERNAME: ${LAGO_SMTP_USERNAME:-}
  LAGO_SMTP_PASSWORD: ${LAGO_SMTP_PASSWORD:-}
  LAGO_PDF_URL: http://pdf:3000
  LAGO_DISABLE_SIGNUP: false
  LAGO_DISABLE_PDF_GENERATION: false
  LAGO_OAUTH_PROXY_URL: https://proxy.getlago.com
  LAGO_CREATE_ORG: ${LAGO_CREATE_ORG:-false}
  LAGO_ORG_USER_PASSWORD: ${LAGO_ORG_USER_PASSWORD:-}
  LAGO_ORG_USER_EMAIL: ${LAGO_ORG_USER_EMAIL:-}
  LAGO_ORG_NAME: ${LAGO_ORG_NAME:-}

x-frontend-environment: &frontend-env
  API_URL: ${API_URL:-https://billing.smartcontents.co.jp/api}
  APP_ENV: production
  LAGO_OAUTH_PROXY_URL: https://proxy.getlago.com
  LAGO_DISABLE_PDF_GENERATION: false

services:
  db:
    <<: *postgres-image
    container_name: lago-db
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-lago} -d ${POSTGRES_DB:-lago} -h localhost -p ${POSTGRES_PORT:-5432}
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lago}
      POSTGRES_USER: ${POSTGRES_USER:-lago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /data/postgres
      PGPORT: ${POSTGRES_PORT:-5432}
    volumes:
      - lago_postgres_data:/data/postgres

  redis:
    <<: *redis-image
    container_name: lago-redis
    restart: unless-stopped
    command: --port ${REDIS_PORT:-6379}
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - lago_redis_data:/data

  migrate:
    <<: *backend-image
    container_name: lago-migrate
    depends_on:
      db:
        condition: service_healthy
    command: ["./scripts/migrate.sh"]
    environment:
      <<: *backend-env

  api:
    <<: *backend-image
    container_name: lago-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./scripts/start.api.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 30s
    environment:
      <<:
        - *backend-env
        - *lago-api-url
        - *lago-front-url
    volumes:
      - lago_storage_data:/app/storage
    expose:
      - "3000"

  front:
    <<: *frontend-image
    container_name: lago-front
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<:
        - *frontend-env
        - *lago-api-url
        - *lago-front-url
    expose:
      - "80"
    # nginx-lago.conf is baked into lago-front-premium image — no bind-mount needed.
    # The config includes: resolver 127.0.0.11 valid=10s, rewrite-based prefix strip,
    # and unique upstream variable to avoid DNS collision on dokploy-network.
    networks:
      - dokploy-network
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.monitoring-billing-kjuuru-26-web.rule=Host(`billing.smartcontents.co.jp`)
      - traefik.http.routers.monitoring-billing-kjuuru-26-web.entrypoints=web
      - traefik.http.routers.monitoring-billing-kjuuru-26-web.service=monitoring-billing-kjuuru-26-web
      - traefik.http.routers.monitoring-billing-kjuuru-26-web.middlewares=redirect-to-https@file
      - traefik.http.services.monitoring-billing-kjuuru-26-web.loadbalancer.server.port=80
      - traefik.http.routers.monitoring-billing-kjuuru-26-websecure.rule=Host(`billing.smartcontents.co.jp`)
      - traefik.http.routers.monitoring-billing-kjuuru-26-websecure.entrypoints=websecure
      - traefik.http.routers.monitoring-billing-kjuuru-26-websecure.service=monitoring-billing-kjuuru-26-websecure
      - traefik.http.routers.monitoring-billing-kjuuru-26-websecure.tls.certresolver=letsencrypt
      - traefik.http.services.monitoring-billing-kjuuru-26-websecure.loadbalancer.server.port=80

  api-worker:
    <<: *backend-image
    container_name: lago-worker
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./scripts/start.worker.sh"]
    environment:
      <<:
        - *backend-env
        - *lago-api-url
    volumes:
      - lago_storage_data:/app/storage

  api-clock:
    <<: *backend-image
    container_name: lago-clock
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./scripts/start.clock.sh"]
    environment:
      <<:
        - *backend-env
        - *lago-api-url

  pdf:
    image: getlago/lago-gotenberg:7.8.2
    container_name: lago-pdf
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
